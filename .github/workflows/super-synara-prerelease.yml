name: Publish Super Synara Unsigned Prerelease

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Downstream version (for example 0.5.5-super.1)"
        required: true
        type: string
      tag:
        description: "Exact immutable tag (for example super-v0.5.5-super.1)"
        required: true
        type: string
      release_scope:
        description: "Exact platform set to publish"
        required: true
        default: windows-only
        type: choice
        options:
          - windows-only
          - windows-and-macos
      confirm_unsigned:
        description: "I understand this publishes unsigned installers with operating-system warnings"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: super-synara-prerelease
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate immutable source and release policy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_scope: ${{ steps.meta.outputs.release_scope }}
      include_macos: ${{ steps.meta.outputs.include_macos }}
      asset_count: ${{ steps.meta.outputs.asset_count }}
      source_commit: ${{ steps.source.outputs.source_commit }}
      source_tag: ${{ steps.source.outputs.source_tag }}
      lockfile_sha256: ${{ steps.source.outputs.lockfile_sha256 }}
      absorbed_upstream_sha: ${{ steps.downstream.outputs.absorbed_upstream_sha }}
      max_windows_bytes: ${{ steps.budget.outputs.max_windows_bytes }}
      max_macos_bytes: ${{ steps.budget.outputs.max_macos_bytes }}
      max_total_bytes: ${{ steps.budget.outputs.max_total_bytes }}
    steps:
      - name: Checkout exact workflow commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Isolate generated route tree
        shell: bash
        run: |
          set -euo pipefail
          printf 'SYNARA_GENERATED_ROUTE_TREE=%s\n' "$RUNNER_TEMP/super-synara-preflight-route-tree/routeTree.gen.ts" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify dependency install preserved source
        run: node scripts/verify-release-worktree-clean.ts

      - id: meta
        name: Require explicit unsigned publication confirmation
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          TAG: ${{ inputs.tag }}
          RELEASE_SCOPE: ${{ inputs.release_scope }}
          CONFIRMED: ${{ inputs.confirm_unsigned }}
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          [[ "$CONFIRMED" == "true" ]]
          [[ "$REF_PROTECTED" == "true" ]]
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-super\.[1-9][0-9]*$ ]]
          [[ "$TAG" == "super-v$VERSION" ]]
          case "$RELEASE_SCOPE" in
            windows-only)
              include_macos=false
              asset_count=6
              ;;
            windows-and-macos)
              include_macos=true
              asset_count=8
              ;;
            *)
              echo "Unsupported release scope: $RELEASE_SCOPE" >&2
              exit 1
              ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_scope=$RELEASE_SCOPE" >> "$GITHUB_OUTPUT"
          echo "include_macos=$include_macos" >> "$GITHUB_OUTPUT"
          echo "asset_count=$asset_count" >> "$GITHUB_OUTPUT"

      - id: budget
        name: Bind repository artifact byte budgets
        shell: bash
        env:
          WINDOWS_BYTES: ${{ vars.SUPER_SYNARA_MAX_WINDOWS_BYTES }}
          MACOS_BYTES: ${{ vars.SUPER_SYNARA_MAX_MACOS_BYTES }}
          TOTAL_BYTES: ${{ vars.SUPER_SYNARA_MAX_TOTAL_BYTES }}
          RELEASE_SCOPE: ${{ steps.meta.outputs.release_scope }}
        run: |
          set -euo pipefail
          [[ "$WINDOWS_BYTES" =~ ^[1-9][0-9]*$ ]]
          [[ "$TOTAL_BYTES" =~ ^[1-9][0-9]*$ ]]
          (( WINDOWS_BYTES <= TOTAL_BYTES ))
          if [[ "$RELEASE_SCOPE" == "windows-and-macos" ]]; then
            [[ "$MACOS_BYTES" =~ ^[1-9][0-9]*$ ]]
            (( MACOS_BYTES <= TOTAL_BYTES ))
            (( WINDOWS_BYTES + MACOS_BYTES <= TOTAL_BYTES ))
          fi
          (( TOTAL_BYTES <= 858986863 ))
          echo "max_windows_bytes=$WINDOWS_BYTES" >> "$GITHUB_OUTPUT"
          echo "max_macos_bytes=$MACOS_BYTES" >> "$GITHUB_OUTPUT"
          echo "max_total_bytes=$TOTAL_BYTES" >> "$GITHUB_OUTPUT"

      - name: Require reviewed macOS signature policy
        if: ${{ steps.meta.outputs.include_macos == 'true' }}
        run: |
          node scripts/verify-super-synara-macos-allowlist.ts \
            scripts/super-synara-macos-signature-allowlist.json \
            40.10.6

      - id: downstream
        name: Validate absorbed upstream state
        shell: bash
        run: node scripts/validate-downstream-state.ts --github-output "$GITHUB_OUTPUT"

      - id: source
        name: Validate source provenance
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          node scripts/verify-release-source-provenance.ts \
            "$VERSION" \
            "$TAG" \
            true \
            "$SOURCE_COMMIT" \
            branch \
            main \
            github-unsigned-prerelease \
            false

      - name: Validate GitHub tag and release state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          node scripts/verify-super-synara-github-state.ts \
            --phase preflight \
            --repository "$GITHUB_REPOSITORY" \
            --ref-name "$GITHUB_REF_NAME" \
            --actor "$GITHUB_ACTOR" \
            --triggering-actor "$GITHUB_TRIGGERING_ACTOR" \
            --owner "$GITHUB_REPOSITORY_OWNER" \
            --tag "$TAG" \
            --source-commit "$GITHUB_SHA"

      - name: Verify Super Synara identity
        run: bun run brand:check

      - name: Check formatting
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Install Chromium test runtime
        run: cd apps/web && ./node_modules/.bin/playwright install --with-deps chromium

      - name: Run stable browser tests
        run: bun run --cwd apps/web test:browser:stable

      - name: Run release contract smoke tests
        run: bun run release:smoke

      - name: Verify preflight preserved source
        run: node scripts/verify-release-worktree-clean.ts

  reserve_tag:
    name: Reserve immutable downstream tag
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout exact source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.preflight.outputs.source_commit }}
          fetch-depth: 0

      - name: Validate reservation state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
        run: |
          node scripts/verify-super-synara-github-state.ts \
            --phase reserve-tag \
            --repository "$GITHUB_REPOSITORY" \
            --ref-name "$GITHUB_REF_NAME" \
            --actor "$GITHUB_ACTOR" \
            --triggering-actor "$GITHUB_TRIGGERING_ACTOR" \
            --owner "$GITHUB_REPOSITORY_OWNER" \
            --tag "$TAG" \
            --source-commit "$SOURCE_COMMIT"

      - name: Create lightweight tag only when absent
        shell: bash
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
        run: |
          set -euo pipefail
          if git show-ref --verify --quiet "refs/tags/$TAG"; then
            [[ "$(git cat-file -t "$TAG")" == "commit" ]]
            [[ "$(git rev-parse "$TAG")" == "$SOURCE_COMMIT" ]]
          else
            git tag "$TAG" "$SOURCE_COMMIT"
            git push origin "refs/tags/$TAG"
          fi

      - name: Revalidate reserved tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
        run: |
          node scripts/verify-super-synara-github-state.ts \
            --phase reserve-tag \
            --repository "$GITHUB_REPOSITORY" \
            --ref-name "$GITHUB_REF_NAME" \
            --actor "$GITHUB_ACTOR" \
            --triggering-actor "$GITHUB_TRIGGERING_ACTOR" \
            --owner "$GITHUB_REPOSITORY_OWNER" \
            --tag "$TAG" \
            --source-commit "$SOURCE_COMMIT"

  windows_x64:
    name: Build unsigned Windows x64 installer
    needs: [preflight, reserve_tag]
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - name: Checkout exact tagged source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.preflight.outputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify dependency install preserved source
        run: node scripts/verify-release-worktree-clean.ts

      - name: Revalidate tagged source
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
        run: |
          node scripts/verify-release-source-provenance.ts \
            "$VERSION" "$TAG" true "$SOURCE_COMMIT" branch main \
            github-unsigned-prerelease true

      - name: Verify Super Synara identity
        run: bun run brand:check

      - name: Run shared desktop identity and certificate regressions
        run: >-
          bun run --cwd packages/shared test
          src/desktopIdentity.test.ts
          src/desktopIdentityProof.test.ts
          src/windowsCertificate.test.ts

      - name: Run Windows desktop shutdown regressions
        run: >-
          bun run --cwd apps/desktop test
          src/backendShutdown.test.ts
          src/backendShutdown.windows.integration.test.ts

      - name: Run Super Synara Windows release contract regressions
        run: >-
          bun run --cwd scripts test
          check-brand-identity.test.ts
          verify-packaged-desktop-startup.test.ts
          lib/desktop-artifact-policy.test.ts
          lib/windows-authenticode.test.ts
          lib/windows-installer-qualification.test.ts
          lib/release-artifact-provenance.test.ts
          lib/super-synara-release-admission.test.ts
          lib/super-synara-workflow-contract.test.ts

      - name: Validate workflow contracts
        run: node scripts/verify-workflow-contracts.ts

      - name: Build unsigned Windows installer
        shell: bash
        env:
          SYNARA_DESKTOP_FLAVOR: super
          SYNARA_DESKTOP_DISABLE_UPDATES: "1"
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
          LOCKFILE_SHA256: ${{ needs.preflight.outputs.lockfile_sha256 }}
        run: |
          bun run dist:desktop:super:win -- \
            --build-version "$VERSION" \
            --source-commit "$SOURCE_COMMIT" \
            --source-tag "$TAG" \
            --lockfile-sha256 "$LOCKFILE_SHA256" \
            --output-dir release-build

      - name: Stage exact Windows payload
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          installer="Super-Synara-$VERSION-windows-x64-unsigned.exe"
          [[ -f "release-build/$installer" ]]
          mkdir release-publish
          cp "release-build/$installer" release-publish/

      - name: Smoke packaged Windows app
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          node scripts/verify-packaged-desktop-startup.ts \
            --assets-dir release-publish \
            --platform win \
            --arch x64 \
            --flavor super \
            --version "$VERSION"

      - id: upstream_release
        name: Select exact stable upstream installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $releasesJson = Join-Path $env:RUNNER_TEMP "upstream-synara-releases.json"
          gh api --paginate --slurp "repos/Emanuele-web04/synara/releases?per_page=100" |
            Set-Content -LiteralPath $releasesJson -Encoding utf8NoBOM
          node scripts/select-upstream-synara-release.ts `
            --releases-json $releasesJson `
            --current-version $env:VERSION `
            --github-output $env:GITHUB_OUTPUT

      - id: upstream_installer
        name: Download exact stable upstream installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_TAG: ${{ steps.upstream_release.outputs.upstream_tag }}
          UPSTREAM_ASSET_NAME: ${{ steps.upstream_release.outputs.upstream_asset_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $directory = Join-Path $env:RUNNER_TEMP "upstream-synara-installer"
          New-Item -ItemType Directory -Path $directory | Out-Null
          gh release download $env:UPSTREAM_TAG `
            --repo Emanuele-web04/synara `
            --pattern $env:UPSTREAM_ASSET_NAME `
            --dir $directory
          $installer = Join-Path $directory $env:UPSTREAM_ASSET_NAME
          if (-not (Test-Path -LiteralPath $installer -PathType Leaf)) {
            throw "Exact upstream Synara installer was not downloaded."
          }
          "path=$installer" >> $env:GITHUB_OUTPUT

      - id: previous_release
        name: Select previous Super Synara prerelease when available
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $releasesJson = Join-Path $env:RUNNER_TEMP "super-synara-releases.json"
          gh api --paginate --slurp "repos/$env:GITHUB_REPOSITORY/releases?per_page=100" |
            Set-Content -LiteralPath $releasesJson -Encoding utf8NoBOM
          node scripts/select-previous-super-synara-release.ts `
            --releases-json $releasesJson `
            --current-version $env:VERSION `
            --github-output $env:GITHUB_OUTPUT

      - id: previous_installer
        if: steps.previous_release.outputs.found == 'true'
        name: Download previous Super Synara installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIOUS_TAG: ${{ steps.previous_release.outputs.previous_tag }}
          PREVIOUS_ASSET_NAME: ${{ steps.previous_release.outputs.previous_asset_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $directory = Join-Path $env:RUNNER_TEMP "previous-super-synara-installer"
          New-Item -ItemType Directory -Path $directory | Out-Null
          gh release download $env:PREVIOUS_TAG `
            --repo $env:GITHUB_REPOSITORY `
            --pattern $env:PREVIOUS_ASSET_NAME `
            --dir $directory
          $installer = Join-Path $directory $env:PREVIOUS_ASSET_NAME
          if (-not (Test-Path -LiteralPath $installer -PathType Leaf)) {
            throw "Exact previous Super Synara installer was not downloaded."
          }
          "path=$installer" >> $env:GITHUB_OUTPUT

      - name: Qualify concurrent Windows side-by-side runtime, upgrade, and uninstall
        shell: pwsh
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          PREVIOUS_FOUND: ${{ steps.previous_release.outputs.found }}
          PREVIOUS_INSTALLER: ${{ steps.previous_installer.outputs.path }}
          UPSTREAM_INSTALLER: ${{ steps.upstream_installer.outputs.path }}
        run: |
          $ErrorActionPreference = "Stop"
          $currentInstaller = Join-Path "release-publish" "Super-Synara-$env:VERSION-windows-x64-unsigned.exe"
          $qualificationArgs = @(
            "scripts/qualify-super-synara-windows-installer.ts",
            "--installer", $currentInstaller,
            "--upstream-installer", $env:UPSTREAM_INSTALLER,
            "--version", $env:VERSION,
            "--report", (Join-Path $env:RUNNER_TEMP "windows-installer-qualification.json")
          )
          if ($env:PREVIOUS_FOUND -eq "true") {
            if ([string]::IsNullOrWhiteSpace($env:PREVIOUS_INSTALLER)) {
              throw "Previous release selection succeeded without a downloaded installer."
            }
            $qualificationArgs += @("--previous-installer", $env:PREVIOUS_INSTALLER)
          }
          node @qualificationArgs

      - name: Write final Windows provenance from native qualification
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
          LOCKFILE_SHA256: ${{ needs.preflight.outputs.lockfile_sha256 }}
          ABSORBED_UPSTREAM_SHA: ${{ needs.preflight.outputs.absorbed_upstream_sha }}
        run: |
          set -euo pipefail
          installer="Super-Synara-$VERSION-windows-x64-unsigned.exe"
          qualification_report="$RUNNER_TEMP/windows-installer-qualification.json"
          [[ -f "$qualification_report" ]]
          node scripts/write-release-artifact-provenance.ts \
            --assets-dir release-publish \
            --platform win \
            --arch x64 \
            --target nsis \
            --version "$VERSION" \
            --source-commit "$SOURCE_COMMIT" \
            --source-tag "$TAG" \
            --lockfile-sha256 "$LOCKFILE_SHA256" \
            --publication true \
            --signed false \
            --distribution-kind github-unsigned-prerelease \
            --distribution-repository "$GITHUB_REPOSITORY" \
            --distribution-prerelease true \
            --distribution-latest false \
            --updater-feed false \
            --absorbed-upstream-sha "$ABSORBED_UPSTREAM_SHA" \
            --windows-qualification-report "$qualification_report" \
            --artifact-files "$installer" \
            --output-file-name artifact-windows-x64.provenance.json

      - name: Enforce Windows artifact budget
        shell: bash
        run: |
          node scripts/enforce-super-synara-artifact-budget.ts \
            release-publish \
            "${{ needs.preflight.outputs.max_windows_bytes }}"

      - name: Verify Windows build changed only declared outputs
        run: node scripts/verify-release-worktree-clean.ts release-build release-publish

      - name: Upload exact Windows lane
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: super-synara-windows-x64
          path: |
            release-publish/Super-Synara-${{ needs.preflight.outputs.version }}-windows-x64-unsigned.exe
            release-publish/artifact-windows-x64.provenance.json
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  macos_arm64:
    name: Build unsigned macOS arm64 disk image
    needs: [preflight, reserve_tag]
    if: ${{ needs.preflight.outputs.include_macos == 'true' }}
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout exact tagged source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.preflight.outputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify dependency install preserved source
        run: node scripts/verify-release-worktree-clean.ts

      - name: Revalidate tagged source
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
        run: |
          node scripts/verify-release-source-provenance.ts \
            "$VERSION" "$TAG" true "$SOURCE_COMMIT" branch main \
            github-unsigned-prerelease true

      - name: Verify Super Synara identity
        run: bun run brand:check

      - name: Run desktop-native regressions
        run: bun run --cwd apps/desktop test

      - name: Run shared desktop identity regressions
        run: >-
          bun run --cwd packages/shared test
          src/desktopIdentity.test.ts
          src/desktopIdentityProof.test.ts

      - name: Run Super Synara macOS release contract regressions
        run: >-
          bun run --cwd scripts test
          lib/desktop-artifact-policy.test.ts
          verify-packaged-desktop-startup.test.ts
          lib/super-synara-macos-signatures.test.ts
          lib/release-artifact-provenance.test.ts
          lib/super-synara-release-admission.test.ts
          lib/super-synara-workflow-contract.test.ts

      - name: Build unsigned macOS disk image
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          SYNARA_DESKTOP_FLAVOR: super
          SYNARA_DESKTOP_DISABLE_UPDATES: "1"
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
          LOCKFILE_SHA256: ${{ needs.preflight.outputs.lockfile_sha256 }}
        run: |
          set -euo pipefail
          test "$(uname -m)" = arm64
          bun run dist:desktop:super:mac -- \
            --build-version "$VERSION" \
            --source-commit "$SOURCE_COMMIT" \
            --source-tag "$TAG" \
            --lockfile-sha256 "$LOCKFILE_SHA256" \
            --output-dir release-build

      - name: Admit exact macOS signatures
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          disk_image="release-build/Super-Synara-$VERSION-macos-arm64-unsigned.dmg"
          [[ -f "$disk_image" ]]
          node scripts/collect-super-synara-macos-signatures.ts \
            --mode admit \
            --dmg "$disk_image" \
            --electron-version 40.10.6 \
            --allowlist scripts/super-synara-macos-signature-allowlist.json \
            --output "$RUNNER_TEMP/macos-signatures.json"

      - name: Smoke packaged macOS app
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          node scripts/verify-packaged-desktop-startup.ts \
            --assets-dir release-build \
            --platform mac \
            --arch arm64 \
            --flavor super \
            --version "$VERSION"

      - name: Stage exact macOS payload and provenance
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
          LOCKFILE_SHA256: ${{ needs.preflight.outputs.lockfile_sha256 }}
          ABSORBED_UPSTREAM_SHA: ${{ needs.preflight.outputs.absorbed_upstream_sha }}
        run: |
          set -euo pipefail
          disk_image="Super-Synara-$VERSION-macos-arm64-unsigned.dmg"
          [[ -f "release-build/$disk_image" ]]
          mkdir release-publish
          cp "release-build/$disk_image" release-publish/
          node scripts/write-release-artifact-provenance.ts \
            --assets-dir release-publish \
            --platform mac \
            --arch arm64 \
            --target dmg \
            --version "$VERSION" \
            --source-commit "$SOURCE_COMMIT" \
            --source-tag "$TAG" \
            --lockfile-sha256 "$LOCKFILE_SHA256" \
            --publication true \
            --signed false \
            --distribution-kind github-unsigned-prerelease \
            --distribution-repository "$GITHUB_REPOSITORY" \
            --distribution-prerelease true \
            --distribution-latest false \
            --updater-feed false \
            --absorbed-upstream-sha "$ABSORBED_UPSTREAM_SHA" \
            --mac-signature-report "$RUNNER_TEMP/macos-signatures.json" \
            --mac-signature-allowlist scripts/super-synara-macos-signature-allowlist.json \
            --artifact-files "$disk_image" \
            --output-file-name artifact-macos-arm64.provenance.json

      - name: Enforce macOS artifact budget
        shell: bash
        run: |
          node scripts/enforce-super-synara-artifact-budget.ts \
            release-publish \
            "${{ needs.preflight.outputs.max_macos_bytes }}"

      - name: Verify macOS build changed only declared outputs
        run: node scripts/verify-release-worktree-clean.ts release-build release-publish

      - name: Upload exact macOS lane
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: super-synara-macos-arm64
          path: |
            release-publish/Super-Synara-${{ needs.preflight.outputs.version }}-macos-arm64-unsigned.dmg
            release-publish/artifact-macos-arm64.provenance.json
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    name: Admit and publish exact unsigned prerelease
    needs: [preflight, reserve_tag, windows_x64, macos_arm64]
    if: >-
      ${{ always() &&
          needs.preflight.result == 'success' &&
          needs.reserve_tag.result == 'success' &&
          needs.windows_x64.result == 'success' &&
          ((needs.preflight.outputs.include_macos == 'true' && needs.macos_arm64.result == 'success') ||
           (needs.preflight.outputs.include_macos == 'false' && needs.macos_arm64.result == 'skipped')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: super-synara-prerelease
    permissions:
      contents: write
    steps:
      - name: Checkout exact source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.preflight.outputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify dependency install preserved source
        run: node scripts/verify-release-worktree-clean.ts

      - name: Download Windows lane
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: super-synara-windows-x64
          path: release-stage

      - name: Download macOS lane
        if: ${{ needs.preflight.outputs.include_macos == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: super-synara-macos-arm64
          path: release-stage

      - name: Validate state before draft creation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
        run: |
          node scripts/verify-super-synara-github-state.ts \
            --phase before-draft \
            --repository "$GITHUB_REPOSITORY" \
            --ref-name "$GITHUB_REF_NAME" \
            --actor "$GITHUB_ACTOR" \
            --triggering-actor "$GITHUB_TRIGGERING_ACTOR" \
            --owner "$GITHUB_REPOSITORY_OWNER" \
            --tag "$TAG" \
            --source-commit "$SOURCE_COMMIT"

      - name: Prepare exact scoped release set
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
          ABSORBED_UPSTREAM_SHA: ${{ needs.preflight.outputs.absorbed_upstream_sha }}
          MAX_TOTAL_BYTES: ${{ needs.preflight.outputs.max_total_bytes }}
          RELEASE_SCOPE: ${{ needs.preflight.outputs.release_scope }}
        run: |
          set -euo pipefail
          macos_allowlist_args=()
          if [[ "$RELEASE_SCOPE" == "windows-and-macos" ]]; then
            macos_allowlist_args=(
              --mac-signature-allowlist scripts/super-synara-macos-signature-allowlist.json
            )
          fi
          node scripts/prepare-super-synara-release.ts prepare \
            --directory release-stage \
            --license LICENSE \
            --release-scope "$RELEASE_SCOPE" \
            "${macos_allowlist_args[@]}" \
            --version "$VERSION" \
            --tag "$TAG" \
            --source-commit "$SOURCE_COMMIT" \
            --absorbed-upstream-sha "$ABSORBED_UPSTREAM_SHA" \
            --max-total-bytes "$MAX_TOTAL_BYTES"

      - id: draft
        name: Create owned draft prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$SOURCE_COMMIT" \
            --title "Unofficial downstream Super Synara $VERSION (unsigned prerelease)" \
            --notes-file release-stage/UNSIGNED-BUILD.md \
            --draft \
            --prerelease \
            --verify-tag \
            --latest=false
          draft_id=""
          for attempt in {1..30}; do
            releases_json="$(
              gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/releases?per_page=100"
            )"
            if draft_id="$(
              jq -er \
                --arg tag "$TAG" \
                --arg source_commit "$SOURCE_COMMIT" \
                '[.[][] | select(.tag_name == $tag and .draft == true and .prerelease == true and .target_commitish == $source_commit)] | if length == 1 then .[0].id elif length == 0 then empty else error("multiple owned drafts") end' \
                <<< "$releases_json"
            )"; then
              break
            else
              query_status=$?
              if [[ "$query_status" -ne 4 ]]; then
                exit "$query_status"
              fi
            fi
            echo "Draft not yet visible (attempt $attempt/30); retrying." >&2
            sleep 1
          done
          [[ "$draft_id" =~ ^[1-9][0-9]*$ ]]
          echo "id=$draft_id" >> "$GITHUB_OUTPUT"

      - name: Validate exact current-run draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
          DRAFT_ID: ${{ steps.draft.outputs.id }}
        run: |
          node scripts/verify-super-synara-github-state.ts \
            --phase after-draft \
            --repository "$GITHUB_REPOSITORY" \
            --ref-name "$GITHUB_REF_NAME" \
            --actor "$GITHUB_ACTOR" \
            --triggering-actor "$GITHUB_TRIGGERING_ACTOR" \
            --owner "$GITHUB_REPOSITORY_OWNER" \
            --tag "$TAG" \
            --source-commit "$SOURCE_COMMIT" \
            --current-run-draft-id "$DRAFT_ID"

      - name: Upload exact release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
          INCLUDE_MACOS: ${{ needs.preflight.outputs.include_macos }}
          EXPECTED_ASSET_COUNT: ${{ needs.preflight.outputs.asset_count }}
        run: |
          set -euo pipefail
          assets=(
            "release-stage/Super-Synara-$VERSION-windows-x64-unsigned.exe"
            release-stage/artifact-windows-x64.provenance.json
          )
          if [[ "$INCLUDE_MACOS" == "true" ]]; then
            assets+=(
              "release-stage/Super-Synara-$VERSION-macos-arm64-unsigned.dmg"
              release-stage/artifact-macos-arm64.provenance.json
            )
          fi
          assets+=(
            release-stage/release-index.json
            release-stage/SHA256SUMS.txt
            release-stage/UNSIGNED-BUILD.md
            release-stage/LICENSE
          )
          [[ "${#assets[@]}" -eq "$EXPECTED_ASSET_COUNT" ]]
          for asset in "${assets[@]}"; do [[ -f "$asset" ]]; done
          gh release upload "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY"

      - name: Redownload and compare uploaded bytes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT_ID: ${{ steps.draft.outputs.id }}
          EXPECTED_ASSET_COUNT: ${{ needs.preflight.outputs.asset_count }}
        run: |
          set -euo pipefail
          mkdir release-redownload
          assets_json="$(gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/releases/$DRAFT_ID/assets?per_page=100")"
          [[ "$(jq '[.[][]] | length' <<< "$assets_json")" -eq "$EXPECTED_ASSET_COUNT" ]]
          while IFS=$'\t' read -r asset_id asset_name; do
            [[ -f "release-stage/$asset_name" ]]
            gh api \
              -H "Accept: application/octet-stream" \
              "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" \
              > "release-redownload/$asset_name"
            cmp "release-stage/$asset_name" "release-redownload/$asset_name"
          done < <(jq -r '.[][] | [.id, .name] | @tsv' <<< "$assets_json")
          diff \
            <(find release-stage -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort) \
            <(find release-redownload -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort)

      - name: Revalidate prepared local bytes
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
          ABSORBED_UPSTREAM_SHA: ${{ needs.preflight.outputs.absorbed_upstream_sha }}
          MAX_TOTAL_BYTES: ${{ needs.preflight.outputs.max_total_bytes }}
          RELEASE_SCOPE: ${{ needs.preflight.outputs.release_scope }}
        run: |
          set -euo pipefail
          macos_allowlist_args=()
          if [[ "$RELEASE_SCOPE" == "windows-and-macos" ]]; then
            macos_allowlist_args=(
              --mac-signature-allowlist scripts/super-synara-macos-signature-allowlist.json
            )
          fi
          node scripts/prepare-super-synara-release.ts verify \
            --directory release-stage \
            --release-scope "$RELEASE_SCOPE" \
            "${macos_allowlist_args[@]}" \
            --version "$VERSION" \
            --tag "$TAG" \
            --source-commit "$SOURCE_COMMIT" \
            --absorbed-upstream-sha "$ABSORBED_UPSTREAM_SHA" \
            --max-total-bytes "$MAX_TOTAL_BYTES"

      - id: downstream
        name: Revalidate absorbed upstream state
        shell: bash
        run: node scripts/validate-downstream-state.ts --github-output "$GITHUB_OUTPUT"

      - name: Bind revalidated absorbed upstream SHA
        shell: bash
        env:
          EXPECTED: ${{ needs.preflight.outputs.absorbed_upstream_sha }}
          ACTUAL: ${{ steps.downstream.outputs.absorbed_upstream_sha }}
        run: test "$ACTUAL" = "$EXPECTED"

      - name: Verify publication preparation changed only declared outputs
        run: node scripts/verify-release-worktree-clean.ts release-stage release-redownload

      - name: Validate state immediately before publication
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
          DRAFT_ID: ${{ steps.draft.outputs.id }}
        run: |
          node scripts/verify-super-synara-github-state.ts \
            --phase before-publish \
            --repository "$GITHUB_REPOSITORY" \
            --ref-name "$GITHUB_REF_NAME" \
            --actor "$GITHUB_ACTOR" \
            --triggering-actor "$GITHUB_TRIGGERING_ACTOR" \
            --owner "$GITHUB_REPOSITORY_OWNER" \
            --tag "$TAG" \
            --source-commit "$SOURCE_COMMIT" \
            --current-run-draft-id "$DRAFT_ID"

      - name: Publish exact draft as non-latest prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT_ID: ${{ steps.draft.outputs.id }}
        run: |
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$DRAFT_ID" \
            -F draft=false \
            -F prerelease=true \
            -f make_latest=false

      - name: Verify public prerelease state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
          RELEASE_ID: ${{ steps.draft.outputs.id }}
        run: |
          set -euo pipefail
          release="$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID")"
          [[ "$(jq -r .tag_name <<< "$release")" == "$TAG" ]]
          [[ "$(jq -r .target_commitish <<< "$release")" == "$SOURCE_COMMIT" ]]
          [[ "$(jq -r .draft <<< "$release")" == "false" ]]
          [[ "$(jq -r .prerelease <<< "$release")" == "true" ]]
          latest_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq .id 2>/dev/null || true)"
          [[ "$latest_id" != "$RELEASE_ID" ]]
