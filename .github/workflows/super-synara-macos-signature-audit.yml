name: Super Synara macOS Signature Audit

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Downstream version to inventory (for example 0.5.5-super.1)"
        required: true
        type: string
      source_sha:
        description: "Exact 40-character downstream source commit"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: super-synara-macos-signature-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Build and inventory unsigned macOS arm64 app
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Require owner-dispatched main revision
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          OWNER: ${{ github.repository_owner }}
          REF_NAME: ${{ github.ref_name }}
          REF_PROTECTED: ${{ github.ref_protected }}
          REF_SHA: ${{ github.sha }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          [[ "$ACTOR" == "$OWNER" ]]
          [[ "$TRIGGERING_ACTOR" == "$OWNER" ]]
          [[ "$REF_NAME" == "main" ]]
          [[ "$REF_PROTECTED" == "true" ]]
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SOURCE_SHA" == "$REF_SHA" ]]

      - name: Checkout exact source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify dependency install preserved source
        run: node scripts/verify-release-worktree-clean.ts

      - id: downstream
        name: Validate downstream state
        shell: bash
        run: node scripts/validate-downstream-state.ts --github-output "$GITHUB_OUTPUT"

      - name: Validate audit source
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$SOURCE_SHA" ]]
          [[ "$VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-super\.([1-9][0-9]*)$ ]]
          CORE_VERSION="${BASH_REMATCH[1]}"
          node scripts/verify-release-source-provenance.ts \
            "$CORE_VERSION" \
            "v$CORE_VERSION" \
            false \
            "$SOURCE_SHA" \
            branch \
            main \
            build-only \
            false

      - name: Build unsigned macOS arm64 audit artifact
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          SYNARA_DESKTOP_FLAVOR: super
          SYNARA_DESKTOP_DISABLE_UPDATES: "1"
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          test "$(uname -m)" = arm64
          lockfile_sha256="$(shasum -a 256 bun.lock | awk '{print $1}')"
          bun run dist:desktop:super:mac -- \
            --build-version "$VERSION" \
            --source-commit "$SOURCE_SHA" \
            --source-tag "super-v$VERSION" \
            --lockfile-sha256 "$lockfile_sha256" \
            --output-dir release-audit

      - name: Collect unclassified signature inventory
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(release-audit/*.dmg)
          [[ "${#dmgs[@]}" -eq 1 ]]
          node scripts/collect-super-synara-macos-signatures.ts \
            --mode audit \
            --dmg "${dmgs[0]}" \
            --electron-version 40.10.6 \
            --output macos-arm64-signature-audit.json

      - name: Verify build changed only declared outputs
        run: |
          node scripts/verify-release-worktree-clean.ts \
            release-audit \
            macos-arm64-signature-audit.json

      - name: Upload inventory only
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: super-synara-macos-arm64-signature-audit
          path: macos-arm64-signature-audit.json
          if-no-files-found: error
          retention-days: 1
          compression-level: 9
