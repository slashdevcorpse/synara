name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality_linux:
    name: quality_linux
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-

      - name: Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate downstream state
        run: node scripts/validate-downstream-state.ts

      - name: Validate workflow contracts
        run: node scripts/verify-workflow-contracts.ts

      - name: Validate test quarantine registry
        run: node scripts/quarantine-registry.ts validate

      - name: Verify Linux terminal PTY native dependency
        run: node scripts/node-pty-smoke.mjs

      - name: Verify Synara identity
        run: bun run brand:check

      - name: Format
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Install browser test runtime
        timeout-minutes: 15
        env:
          DEBIAN_FRONTEND: noninteractive
        run: bun run --cwd apps/web test:browser:install

      - name: Browser test (stable)
        timeout-minutes: 20
        run: bun run --cwd apps/web test:browser:stable

      - name: Browser test (registered Linux quarantine)
        continue-on-error: true
        timeout-minutes: 10
        run: node scripts/quarantine-registry.ts run --platform linux

      - name: Summarize Linux quarantine
        if: always()
        run: node scripts/quarantine-registry.ts summary --platform linux --baseline-ref "${{ github.event.pull_request.base.sha || github.event.before }}" --github-step-summary

      - name: Build desktop pipeline
        run: bun run build:desktop

      - name: Verify preload bundle output
        run: |
          test -f apps/desktop/dist-electron/preload.js
          grep -nE "desktopBridge|getWsUrl|PICK_FOLDER_CHANNEL|wsUrl" apps/desktop/dist-electron/preload.js

      - name: Upload Linux desktop E2E build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: desktop-build-linux
          path: |
            apps/desktop/dist-electron/**
            apps/server/dist/**
            apps/web/dist/**
            packages/contracts/dist/**
            packages/effect-acp/dist/**
          if-no-files-found: error
          retention-days: 1

  quality_windows:
    name: quality_windows
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-quality-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-quality-${{ hashFiles('bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  unit:
    name: unit_${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-24.04
            turbo_concurrency: "50%"
          - platform: windows
            runner: windows-2022
            turbo_concurrency: "1"
          - platform: macos
            runner: macos-15
            turbo_concurrency: "50%"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-unit-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-unit-${{ hashFiles('bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows Job launcher for unit suite
        if: matrix.platform == 'windows'
        run: node apps/server/scripts/build-windows-job-launcher.mjs --arch x64

      - name: Test with coverage and JUnit
        id: unit_tests
        if: matrix.platform == 'linux'
        timeout-minutes: 30
        env:
          TURBO_CONCURRENCY: ${{ matrix.turbo_concurrency }}
        run: bun run test:ci

      - name: Run cross-platform unit suite
        if: matrix.platform != 'linux'
        timeout-minutes: 30
        env:
          TURBO_CONCURRENCY: ${{ matrix.turbo_concurrency }}
        run: bun turbo test

      - name: Upload test results to Mergify CI Insights
        id: mergify_ci
        if: ${{ matrix.platform == 'linux' && !cancelled() && (steps.unit_tests.outcome == 'success' || steps.unit_tests.outcome == 'failure') && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: Mergifyio/gha-mergify-ci@8173bc3c1d337d3367454672d50cfdf6f0273396 # v23
        with:
          action: junit-process
          token: ${{ secrets.MERGIFY_TOKEN }}
          job_name: quality
          report_path: >-
            ./apps/desktop/test-report.junit.xml
            ./apps/server/test-report.junit.xml
            ./apps/web/test-report.junit.xml
            ./packages/contracts/test-report.junit.xml
            ./packages/shared/test-report.junit.xml
            ./scripts/test-report.junit.xml
          test_step_outcome: ${{ steps.unit_tests.outcome }}

      - name: Verify Mergify test results upload
        if: ${{ matrix.platform == 'linux' && !cancelled() && (steps.unit_tests.outcome == 'success' || steps.unit_tests.outcome == 'failure') && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
        env:
          MERGIFY_UPLOAD_OUTCOME: ${{ steps.mergify_ci.outputs.test_results_upload }}
        run: test "$MERGIFY_UPLOAD_OUTCOME" = "success"

      - name: Upload coverage reports to Codecov
        if: ${{ matrix.platform == 'linux' && !cancelled() && (steps.unit_tests.outcome == 'success' || steps.unit_tests.outcome == 'failure') }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/desktop/coverage/lcov.info,./apps/server/coverage/lcov.info,./apps/web/coverage/lcov.info,./packages/contracts/coverage/lcov.info,./packages/shared/coverage/lcov.info,./scripts/coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          flags: unit
          name: super-synara-unit-coverage

      - name: Upload test results to Codecov
        if: ${{ matrix.platform == 'linux' && !cancelled() && (steps.unit_tests.outcome == 'success' || steps.unit_tests.outcome == 'failure') }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/desktop/test-report.junit.xml,./apps/server/test-report.junit.xml,./apps/web/test-report.junit.xml,./packages/contracts/test-report.junit.xml,./packages/shared/test-report.junit.xml,./scripts/test-report.junit.xml
          disable_search: true
          fail_ci_if_error: true
          flags: unit
          name: super-synara-unit-test-results
          report_type: test_results

  windows_x64:
    name: windows_x64
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows Job launcher (x64)
        run: node apps/server/scripts/build-windows-job-launcher.mjs --arch x64

      - name: Build Windows Job launcher (ARM64)
        run: node apps/server/scripts/build-windows-job-launcher.mjs --arch arm64

      - name: Run Windows Job containment regressions
        run: >-
          bun run --cwd apps/server test
          src/provider/windowsProviderProcess.test.ts
          src/provider/windowsProviderProcess.windows.test.ts

      - name: Verify Super Synara identity
        run: bun run brand:check

      - name: Run shared desktop identity and certificate regressions
        run: >-
          bun run --cwd packages/shared test
          src/desktopIdentity.test.ts
          src/desktopIdentityProof.test.ts
          src/windowsCertificate.test.ts

      - name: Run Windows desktop shutdown regressions
        run: >-
          bun run --cwd apps/desktop test
          src/backendShutdown.test.ts
          src/backendShutdown.windows.integration.test.ts

      - name: Run Windows desktop restart regressions
        run: >-
          bun run --cwd apps/desktop test
          src/backendRestartController.test.ts
          src/backendStartupReadiness.test.ts
          src/rotatingFileSink.test.ts

      - name: Run Windows process regressions
        run: >-
          bun run --cwd packages/shared test
          src/windowsProcess.test.ts

      - name: Run Windows Codex executable regressions
        run: bun run --cwd packages/shared test src/codexCliExecutable.test.ts

      - name: Run Windows provider startup and migration regressions
        run: >-
          bun run --cwd apps/server test
          src/windowsProcessEffect.test.ts
          src/codexAppServerManager.test.ts
          src/provider/Layers/ProviderHealth.test.ts
          src/provider/acp/AcpJsonRpcConnection.test.ts
          src/persistence/MigrationBackup.test.ts
          src/restoreMigrationBackup.test.ts

      - name: Run Windows CLI maintenance regressions
        run: bun run --cwd apps/server test src/provider/providerMaintenance.test.ts

      - name: Run Windows Codex overlay ownership regressions
        run: bun run --cwd apps/server test src/codexProcessEnv.test.ts

      - name: Run Windows desktop lifecycle regressions
        run: >-
          bun run --cwd apps/desktop test
          src/desktopMigrationRecovery.test.ts
          src/desktopStorageMigration.test.ts
          src/windowState.test.ts
          src/updateState.test.ts

      - name: Run Windows desktop smoke containment regressions
        run: >-
          bun run --cwd apps/desktop test
          scripts/smoke-test.test.mjs
          scripts/smoke-test-windows-job.windows.integration.test.mjs

      - name: Run Super Synara Windows release contract regressions
        run: >-
          bun run --cwd scripts test
          check-brand-identity.test.ts
          verify-packaged-desktop-startup.test.ts
          lib/desktop-artifact-policy.test.ts
          lib/windows-authenticode.test.ts
          lib/windows-installer-qualification.test.ts
          lib/release-artifact-provenance.test.ts
          lib/super-synara-release-admission.test.ts
          lib/super-synara-workflow-contract.test.ts

      - name: Validate workflow contracts
        run: node scripts/verify-workflow-contracts.ts

      - name: Build desktop pipeline
        env:
          SYNARA_DESKTOP_DISABLE_UPDATES: "1"
          SYNARA_DESKTOP_FLAVOR: super
        run: bun run build:desktop

      - name: Verify isolated packaged CLI runtime
        run: node apps/server/scripts/cli.ts publish --dry-run

      - name: Verify two-launch desktop persistence
        timeout-minutes: 5
        env:
          SYNARA_DESKTOP_DISABLE_UPDATES: "1"
          SYNARA_DESKTOP_FLAVOR: super
          SYNARA_HOME: ${{ runner.temp }}\super-synara-persistence-windows-home
        run: bun run test:desktop-persistence-smoke

      - name: Smoke unpacked desktop in isolated state
        env:
          SYNARA_DESKTOP_DISABLE_UPDATES: "1"
          SYNARA_DESKTOP_FLAVOR: super
          SYNARA_HOME: ${{ runner.temp }}\super-synara-ci-home
          SYNARA_PORT_OFFSET: "2710"
        run: bun run --cwd apps/desktop smoke-test

      - name: Upload Windows desktop E2E build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: desktop-build-windows
          path: |
            apps/desktop/dist-electron/**
            apps/server/dist/**
            apps/web/dist/**
            packages/contracts/dist/**
            packages/effect-acp/dist/**
          if-no-files-found: error
          retention-days: 1

  browser_windows:
    name: browser_windows
    runs-on: windows-2022
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-browser-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-browser-${{ hashFiles('bun.lock') }}-

      - name: Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate test quarantine registry
        run: node scripts/quarantine-registry.ts validate

      - name: Install browser test runtime
        timeout-minutes: 15
        run: bun run --cwd apps/web playwright install chromium

      - name: Browser test (stable)
        timeout-minutes: 20
        run: bun run --cwd apps/web test:browser:stable

      - name: Browser test (registered Windows quarantine)
        continue-on-error: true
        timeout-minutes: 10
        run: node scripts/quarantine-registry.ts run --platform windows

      - name: Summarize Windows quarantine
        if: always()
        run: node scripts/quarantine-registry.ts summary --platform windows --baseline-ref "${{ github.event.pull_request.base.sha || github.event.before }}" --github-step-summary

  e2e_linux:
    name: e2e_linux
    needs: quality_linux
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Cache Bun
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-desktop-e2e-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-desktop-e2e-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Linux desktop E2E build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: desktop-build-linux
          path: .

      - name: Install desktop E2E system dependencies
        run: bun run --cwd apps/web playwright install-deps chromium

      - name: Run packaged desktop E2E
        run: xvfb-run -a bun run test:e2e

      - name: Upload Linux desktop E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: desktop-e2e-linux-diagnostics
          path: |
            apps/desktop/test-results/**
            apps/desktop/playwright-report/**
          if-no-files-found: ignore
          retention-days: 7

  e2e_windows:
    name: e2e_windows
    needs: windows_x64
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Cache Bun
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-desktop-e2e-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-desktop-e2e-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Windows desktop E2E build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: desktop-build-windows
          path: .

      - name: Run packaged desktop E2E
        run: bun run test:e2e

      - name: Upload Windows desktop E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: desktop-e2e-windows-diagnostics
          path: |
            apps/desktop/test-results/**
            apps/desktop/playwright-report/**
          if-no-files-found: ignore
          retention-days: 7

  macos_arm64:
    name: macos_arm64
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify arm64 runner architecture
        run: test "$(uname -m)" = arm64

      - name: Verify Super Synara identity
        run: bun run brand:check

      - name: Verify native terminal helper
        run: node scripts/node-pty-smoke.mjs

      - name: Run desktop-native regressions
        run: bun run --cwd apps/desktop test

      - name: Build desktop pipeline
        env:
          SYNARA_DESKTOP_DISABLE_UPDATES: "1"
          SYNARA_DESKTOP_FLAVOR: super
        run: bun run build:desktop

      - name: Verify two-launch desktop persistence
        timeout-minutes: 5
        env:
          SYNARA_DESKTOP_DISABLE_UPDATES: "1"
          SYNARA_DESKTOP_FLAVOR: super
          SYNARA_HOME: ${{ runner.temp }}/super-synara-persistence-macos-home
        run: bun run test:desktop-persistence-smoke

      - name: Smoke unpacked desktop in isolated state
        env:
          SYNARA_DESKTOP_DISABLE_UPDATES: "1"
          SYNARA_DESKTOP_FLAVOR: super
          SYNARA_HOME: ${{ runner.temp }}/super-synara-ci-home
          SYNARA_PORT_OFFSET: "2810"
        run: bun run test:desktop-smoke

  quality:
    name: quality
    if: always()
    needs:
      - quality_linux
      - quality_windows
      - unit
      - browser_windows
      - e2e_linux
      - e2e_windows
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every quality dependency to succeed
        run: |
          test "${{ needs.quality_linux.result }}" = success
          test "${{ needs.quality_windows.result }}" = success
          test "${{ needs.unit.result }}" = success
          test "${{ needs.browser_windows.result }}" = success
          test "${{ needs.e2e_linux.result }}" = success
          test "${{ needs.e2e_windows.result }}" = success

  release_smoke:
    name: release_smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Validate downstream state
        run: node scripts/validate-downstream-state.ts

      - name: Validate source workflow contracts
        run: node scripts/verify-workflow-contracts.ts

      - name: Verify disabled workflow state on downstream main
        if: github.repository == 'slashdevcorpse/synara' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/verify-workflow-contracts.ts --check-github-state

      - name: Verify Synara identity
        run: bun run brand:check

      - name: Exercise release-only workflow steps
        run: node scripts/release-smoke.ts
